<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Entrar</h1>
      <p>Acesse sua conta no Voz Urbana</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <app-form-input label="CPF" type="text" placeholder="000.000.000-00" formControlName="cpf"
        [control]="$any(loginForm.get('cpf'))" icon="person"></app-form-input>

      <app-form-input label="Senha" type="password" placeholder="Sua senha" formControlName="password"
        [control]="$any(loginForm.get('password'))" icon="lock"></app-form-input>

      <div class="form-actions">
        <a href="#" class="forgot-password">Esqueci minha senha</a>
      </div>

      <button type="submit" class="btn btn-primary login-button" [disabled]="loginForm.invalid && loginForm.touched">
        <span>Entrar</span>
        <span class="material-symbols-outlined">login</span>
      </button>
    </form>

    <div class="login-footer">
      <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
    </div>
  </div>
</div>
