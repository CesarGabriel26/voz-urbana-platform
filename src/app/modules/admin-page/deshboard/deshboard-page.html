<div class="dashboard">

    <div class="metrics">

        <div class="card metric open">
            <span class="metric-value">{{ stats().openComplaints }}</span>
            <span class="metric-label">Reclamações em aberto</span>
        </div>

        <div class="card metric done">
            <span class="metric-value">{{ stats().resolvedComplaints }}</span>
            <span class="metric-label">Reclamações resolvidas</span>
        </div>

        <div class="card metric open">
            <span class="metric-value">{{ stats().openPetitions }}</span>
            <span class="metric-label">Petições ativas</span>
        </div>

        <div class="card metric done">
            <span class="metric-value">{{ stats().closedPetitions }}</span>
            <span class="metric-label">Petições concluídas</span>
        </div>

    </div>

    <div class="card">
        <h3>Mapa de ocorrências</h3>
        <m-map [points]="mapPoints"></m-map>
    </div>
</div>
