<div class="data-table">
    <div class="search">
        <m-form-input [formControl]="searchControl" [control]="searchControl"
            placeholder="Buscar reclamações por título, descrição ou categoria..." icon="search">
        </m-form-input>
    </div>
    <m-data-table [data]="categories()" [columns]="columns" [filterFields]="filterFields" table="table" [query]="searchControl.value" [pageSize]="15">
    </m-data-table>
</div>
